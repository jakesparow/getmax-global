name: Daily Blog Generator (ContentPilot)

on:
  schedule:
    # Runs daily at 6:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate-blog.py

      - name: Distribute to social channels
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: python scripts/post-to-social.py

      - name: Commit and push new post
        run: |
          git config user.name "Getmax ContentPilot"
          git config user.email "content@getmaxglobal.com"
          git add public/blog/posts.json
          git diff --cached --quiet || git commit -m "blog: auto-generated daily post $(date +%Y-%m-%d)"
          git push
